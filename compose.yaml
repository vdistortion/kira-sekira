services:
  db:
    image: postgres:16-alpine
    container_name: kira-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: studio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - net

  studio:
    image: directus/directus:12
    container_name: kira-studio-dev
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      DB_CLIENT: pg
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: studio
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      CORS_ENABLED: true
      CORS_ORIGIN: ${CORS_ORIGIN}
      PUBLIC_URL: ${PUBLIC_URL}
    ports:
      - '8055:8055'
    volumes:
      - directus_uploads:/directus/uploads
      - ./directus:/directus/snapshots
    depends_on:
      - db
    networks:
      - net

volumes:
  postgres_data:
  directus_uploads:

networks:
  net:
    driver: bridge
