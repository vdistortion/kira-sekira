name: kira-sekira-release

services:
  postgres:
    container_name: kira-postgres-release
    image: postgres:16-alpine
    env_file: .env.release
    volumes:
      - postgres_data_release:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal

  main:
    container_name: kira-main-release
    image: ghcr.io/vdistortion/kira-sekira-main:release
    env_file: .env.release
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - postgres

  models:
    container_name: kira-models-release
    image: ghcr.io/vdistortion/kira-sekira-models:release
    env_file: .env.release
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - postgres

  studio:
    container_name: kira-studio-release
    image: ghcr.io/vdistortion/kira-sekira-studio:release
    env_file: .env.release
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - postgres
    volumes:
      - studio_media_release:/app/media

  caddy:
    container_name: kira-caddy-release
    image: caddy:2-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data_release:/data
    restart: unless-stopped
    networks:
      - internal

volumes:
  postgres_data_release:
  studio_media_release:
  caddy_data_release:

networks:
  internal:
