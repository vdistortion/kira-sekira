name: kira-sekira-release

services:
  db:
    container_name: kira-postgres-release
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: studio
    volumes:
      - postgres_data_release:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s

  site:
    container_name: kira-site-release
    image: ghcr.io/vdistortion/kira-sekira-site:release
    restart: unless-stopped
    networks:
      - internal
      - caddy
    labels:
      caddy: test.kira-sekira.ru
      caddy.reverse_proxy: '{{upstreams 4000}}'

  models:
    container_name: kira-models-release
    image: ghcr.io/vdistortion/kira-sekira-models:release
    restart: unless-stopped
    networks:
      - internal
      - caddy
    labels:
      caddy: 'yana.kira-sekira.ru kirochka.kira-sekira.ru'
      caddy.reverse_proxy: '{{upstreams 4201}}'

  studio:
    container_name: kira-studio-release
    image: ghcr.io/vdistortion/kira-sekira-studio:release
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      SERVER_URL: ${SERVER_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - internal
      - caddy
    labels:
      caddy: studio.kira-sekira.ru
      caddy.reverse_proxy: '{{upstreams 3000}}'
      caddy.request_body.max_size: 50MB
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - studio_media_release:/app/media

volumes:
  postgres_data_release:
  studio_media_release:

networks:
  internal:
  caddy:
    external: true
