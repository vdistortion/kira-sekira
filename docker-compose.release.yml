name: kira-sekira-release

services:
  postgres:
    image: postgres:16-alpine
    env_file: .env.release
    volumes:
      - postgres_data_release:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal

  main:
    build:
      context: .
      dockerfile: apps/main/Dockerfile
    env_file: .env.release
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - postgres

  models:
    build:
      context: .
      dockerfile: apps/models/Dockerfile
    env_file: .env.release
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - postgres

  studio:
    build:
      context: .
      dockerfile: apps/studio/Dockerfile
    env_file: .env.release
    restart: unless-stopped
    networks:
      - internal
    depends_on:
      - postgres
    volumes:
      - studio_media_release:/app/media

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data_release:/data
    restart: unless-stopped
    networks:
      - internal

volumes:
  postgres_data_release:
  studio_media_release:
  caddy_data_release:

networks:
  internal:
