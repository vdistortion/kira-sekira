@if (loading()) {
  <div class="loading">Загрузка...</div>
}

@if (gallery(); as g) {
  <div class="project-page">
    <div class="project-page__header">
      <a routerLink="/" class="project-page__back">← Назад в портфолио</a>
      <h1 class="project-page__title">{{ g.title }}</h1>
    </div>

    <div class="project-page__gallery">
      @for (img of g.images; track img.url) {
        <figure class="project-page__figure">
          <img [src]="img.url" [alt]="g.title" loading="lazy" />
        </figure>
      }
    </div>
  </div>
}
