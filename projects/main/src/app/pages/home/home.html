<app-page [title]="'Проекты'" [isHomePage]="true">
  <div class="home-page">
    <div class="home-page__item">
      <div class="home-page__image">
        <img [src]="aboutImage()" [alt]="projectsName()" />
      </div>
      <div class="home-page__content">
        @if (aboutMarkdown()) {
          <div [innerHTML]="aboutMarkdown() | markdown"></div>
        }
      </div>
    </div>
    <div #projectsTarget class="home-page__item">
      <div class="home-page__title">{{ projectsName() }}</div>
    </div>
    <app-project-list></app-project-list>
  </div>
</app-page>
