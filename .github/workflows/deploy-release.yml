name: Deploy Release

on:
  push:
    branches:
      - release
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/kira-sekira

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # Собираем и пушим каждый образ последовательно
      - name: Build and push main
        uses: docker/build-push-action@v6
        with:
          context: .
          file: projects/main/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-main:release

      - name: Build and push models
        uses: docker/build-push-action@v6
        with:
          context: .
          file: projects/models/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-models:release

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: POSTGRES_PASSWORD,DIRECTUS_KEY,DIRECTUS_SECRET,GHCR_PAT,GHCR_USER,REPO_URL
          script: |
            REPO_PATH=~/projects/kira-sekira
            if [ ! -d "$REPO_PATH" ]; then
              mkdir -p ~/projects
              git clone -b release "$REPO_URL" "$REPO_PATH"
            fi
            cd "$REPO_PATH"
            git pull origin release

            printf '%s\n' \
              "POSTGRES_HOST=db" \
              "POSTGRES_PORT=5432" \
              "POSTGRES_USER=postgres" \
              "POSTGRES_DB=studio" \
              "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}" \
              "DIRECTUS_KEY=${DIRECTUS_KEY}" \
              "DIRECTUS_SECRET=${DIRECTUS_SECRET}" \
              > .env

            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            docker compose -f compose.release.yaml pull
            docker compose -f compose.release.yaml up -d
            docker system prune --force
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DIRECTUS_KEY: ${{ secrets.DIRECTUS_KEY }}
          DIRECTUS_SECRET: ${{ secrets.DIRECTUS_SECRET }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ github.actor }}
          REPO_URL: https://github.com/${{ github.repository }}.git

      - name: Notify Telegram
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_ADMIN_ID }}" \
            -d text="🚀 kira-sekira deployed"

  delete-old-images:
    needs: [build-and-deploy]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ['kira-sekira-main', 'kira-sekira-models']
    steps:
      - uses: actions/delete-package-versions@v5
        continue-on-error: true
        with:
          package-name: ${{ matrix.package }}
          package-type: 'container'
          delete-only-untagged-versions: 'true'
