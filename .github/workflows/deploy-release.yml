name: Deploy Release

on:
  push:
    branches:
      - release
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/kira-sekira

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # Собираем и пушим каждый образ последовательно
      - name: Build and push site
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/site/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-site:release

      - name: Build and push models
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/models/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-models:release

      - name: Build and push studio
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/studio/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-studio:release
          no-cache: true

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            REPO_PATH=~/projects/kira-sekira
            if [ ! -d "$REPO_PATH" ]; then
              mkdir -p ~/projects
              git clone -b release https://github.com/${{ github.repository }}.git "$REPO_PATH"
            fi
            cd "$REPO_PATH"
            git pull origin release

            # Генерация .env.release
            echo "POSTGRES_USER=postgres" > .env.release
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env.release
            echo "POSTGRES_DB=studio" >> .env.release
            echo "PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET }}" >> .env.release
            echo "SERVER_URL=${{ secrets.SERVER_URL }}" >> .env.release

            # Авторизация в GHCR на сервере
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose -f docker-compose.release.yml pull
            docker compose -f docker-compose.release.yml up -d
            docker exec $(docker ps --filter "name=studio" --format "{{.Names}}") npx payload migrate
            docker system prune --force

            # Уведомление в Telegram
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_ADMIN_ID }}" \
              -d text="🚀 kira-sekira updated"

  delete-old-images:
    needs: [build-and-deploy]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ['kira-sekira-site', 'kira-sekira-models', 'kira-sekira-studio']
    steps:
      - name: Delete old untagged images
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.package }}
          package-type: 'container'
          delete-only-untagged-versions: 'true'
