name: Deploy Main

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Деплой на VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: '30m'
          script: |
            REPO_PATH=~/projects/kira-sekira_main
            if [ ! -d "$REPO_PATH" ]; then
              mkdir -p ~/projects
              git clone -b main git@github.com:${{ github.repository }}.git "$REPO_PATH"
            fi
            cd "$REPO_PATH"

            # Генерация .env.main
            echo "POSTGRES_USER=postgres" > .env.main
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD_MAIN }}" >> .env.main
            echo "POSTGRES_DB=studio" >> .env.main
            echo "DATABASE_URL=postgres://postgres:${{ secrets.POSTGRES_PASSWORD_MAIN }}@postgres:5432/studio" >> .env.main
            echo "PAYLOAD_SECRET=${{ secrets.PAYLOAD_SECRET_MAIN }}" >> .env.main
            echo "SERVER_URL=${{ secrets.SERVER_URL_MAIN }}" >> .env.main

            git pull origin main
            docker compose -f docker-compose.main.yml build --parallel=false
            docker compose -f docker-compose.main.yml up -d

            # Уведомление в Telegram
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_ADMIN_ID }}" \
              -d text="✅ kira-sekira_main updated"
