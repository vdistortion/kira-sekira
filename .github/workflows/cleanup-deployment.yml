name: Cleanup Deployment

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Clean up VPS (remove containers, volumes, project folder)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            PROJECT_DIR=~/projects/kira-sekira

            if [ -d "$PROJECT_DIR" ]; then
              cd "$PROJECT_DIR"
              echo "🗑 Stopping and removing containers, volumes..."
              docker compose -f docker-compose.release.yml down -v --rmi all 2>/dev/null || true
              cd ~
              echo "🗑 Deleting project folder..."
              rm -rf "$PROJECT_DIR"
              echo "✅ VPS cleaned"
            else
              echo "ℹ️ Project folder not found, nothing to clean"
            fi

      - name: Delete GitHub Packages versions (tagged 'release')
        env:
          GH_TOKEN: ${{ secrets.GHCR_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -e
          PACKAGES=("kira-sekira-main" "kira-sekira-models" "kira-sekira-studio")
          for pkg in "${PACKAGES[@]}"; do
            echo "🔍 Processing package: $pkg"
            # Получаем ID версии с тегом 'release'
            version_id=$(gh api -H "Accept: application/vnd.github+json" \
              "/orgs/${REPO_OWNER}/packages/container/${pkg}/versions" \
              --jq '.[] | select(.metadata.container.tags[]? == "release") | .id' | head -1)
            if [ -n "$version_id" ]; then
              echo "🗑 Deleting version $version_id with tag 'release'"
              gh api -X DELETE "/orgs/${REPO_OWNER}/packages/container/${pkg}/versions/$version_id"
            else
              echo "ℹ️ No version with tag 'release' found for $pkg"
            fi
            # Также удаляем все untagged версии (остатки предыдущих сборок)
            untagged_ids=$(gh api -H "Accept: application/vnd.github+json" \
              "/orgs/${REPO_OWNER}/packages/container/${pkg}/versions" \
              --jq '.[] | select(.metadata.container.tags == []) | .id')
            if [ -n "$untagged_ids" ]; then
              echo "🗑 Deleting untagged versions..."
              for id in $untagged_ids; do
                gh api -X DELETE "/orgs/${REPO_OWNER}/packages/container/${pkg}/versions/$id"
              done
            fi
          done
          echo "✅ GitHub Packages cleaned"
