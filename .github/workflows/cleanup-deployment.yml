name: Cleanup Deployment

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Clean up VPS (remove containers, volumes, project folder)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            PROJECT_DIR=~/projects/kira-sekira

            if [ -d "$PROJECT_DIR" ]; then
              cd "$PROJECT_DIR"
              echo "🗑 Stopping and removing containers, volumes..."
              docker compose -f compose.release.yaml down -v --rmi all 2>/dev/null || true
              cd ~
              echo "🗑 Deleting project folder..."
              rm -rf "$PROJECT_DIR"
              echo "✅ VPS cleaned"
            else
              echo "ℹ️ Project folder not found, nothing to clean"
            fi

      - name: Delete GitHub Packages
        env:
          GH_TOKEN: ${{ secrets.GHCR_PAT }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -e
          PACKAGES=("kira-sekira-main" "kira-sekira-models")
          for pkg in "${PACKAGES[@]}"; do
            echo "🗑 Deleting entire package: $pkg"
            gh api -X DELETE "/users/${REPO_OWNER}/packages/container/${pkg}" || echo "ℹ️ Package $pkg not found or already deleted"
          done
          echo "✅ GitHub Packages cleaned"
