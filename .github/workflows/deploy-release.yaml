name: Deploy Release

on:
  push:
    branches:
      - release
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/kira-sekira

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      # Собираем и пушим каждый образ последовательно
      - name: Build and push main
        uses: docker/build-push-action@v6
        with:
          context: .
          file: projects/main/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-main:release

      - name: Build and push models
        uses: docker/build-push-action@v6
        with:
          context: .
          file: projects/models/Dockerfile
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-models:release

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_PASSWORD,DIRECTUS_KEY,DIRECTUS_SECRET,CORS_ORIGIN,PUBLIC_URL,GHCR_PAT,GHCR_USER,REPO_URL
          script: |
            REPO_PATH=~/projects/kira-sekira
            if [ ! -d "$REPO_PATH" ]; then
              mkdir -p ~/projects
              git clone -b release "$REPO_URL" "$REPO_PATH"
            fi
            cd "$REPO_PATH"
            git pull origin release

            printf '%s\n' \
              "DB_PASSWORD='${DB_PASSWORD}'" \
              "DIRECTUS_KEY='${DIRECTUS_KEY}'" \
              "DIRECTUS_SECRET='${DIRECTUS_SECRET}'" \
              "CORS_ORIGIN='${CORS_ORIGIN}'" \
              "PUBLIC_URL='${PUBLIC_URL}'" \
              > .env

            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            docker compose -f compose.release.yaml pull
            docker compose -f compose.release.yaml up -d
            docker system prune --force
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DIRECTUS_KEY: ${{ secrets.DIRECTUS_KEY }}
          DIRECTUS_SECRET: ${{ secrets.DIRECTUS_SECRET }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          PUBLIC_URL: ${{ secrets.PUBLIC_URL }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ github.actor }}
          REPO_URL: https://github.com/${{ github.repository }}.git

      - name: Notify Telegram
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_ADMIN_ID }}" \
            -d text="🚀 kira-sekira deployed"

  delete-old-images:
    needs: [build-and-deploy]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ['kira-sekira-main', 'kira-sekira-models']
    steps:
      - name: Delete untagged container versions for ${{ matrix.package }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GHCR_PAT }}
          PACKAGE: ${{ matrix.package }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -e
          echo "Fetching untagged versions for package $PACKAGE..."
          ids=$(gh api -H "Accept: application/vnd.github+json" \
            "/users/${OWNER}/packages/container/${PACKAGE}/versions?per_page=100" \
            --jq '.[] | select(.metadata.container.tags | length == 0) | .id')
          if [ -z "$ids" ]; then
            echo "No untagged versions found."
            exit 0
          fi
          for id in $ids; do
            echo "Deleting version $id..."
            gh api -X DELETE "/users/${OWNER}/packages/container/${PACKAGE}/versions/$id" || echo "Failed to delete version $id"
          done
